# SUMO 环境接入示例（道路累计过车数版本，一套模块一个 yaml）
# 说明：
# - 复用 MASDiff 主流程与 sumo_ryl 的 DQN / 扩散 / Q / metric 组件
# - 仅把环境替换为“道路累计过车数”版本
# - 使用 testsumo.net.xml / testsumo.rou.xml / testsumo.sumocfg

seed: 42

algorithm:
  M: 100
  N: 2336
  K: 1

elite:
  elite_count: 20

truncated_diffusion:
  add_noise_steps: 5
  denoise_steps: 5

logging:
  best_rho_csv_path: "outputs/sumo_ryl_nov_best_rho_history.csv"
  initial_population_path: "outputs/sumo_ryl_nov_initial_population.pkl"

q_provider:
  class_path: "src.q.sumo_ryl_nov_q:SumoRylQProvider"
  kwargs:
    # testsumo.rou.xml 中 vehicle 数量 = 2336
    num_car: 2336
    cache_path: "outputs/Q_nov.pickle"
    force_recompute: false

environment:
  class_path: "src.environments.sumo_ryl_nov:SumoRylNovEnvironment"
  kwargs:
    # --- SUMO 基础配置 ---
    sumo_config: "maps/testsumo.sumocfg"
    net_file: "maps/testsumo.net.xml"
    route_file: "maps/testsumo.rou.xml"
    sumo_use_gui: false
    # sumo_binary: "sumo"

    # --- 仿真控制 ---
    # testsumo.rou.xml 中注释区间为 begin=0, end=600
    end_tick: 600
    update_interval: 600
    sample_interval: 600

    # 模型平时放 CPU；推理时按 policy_device 临时迁移
    move_policies_to_device: false
    policy_device: "cpu"

    # --- 额外 SUMO 参数（可选）---
    extra_sumo_args:
      # - "--seed"
      # - "0"

dqn_module:
  class_path: "src.dqn.sumo_ryl_dqn:SumoRylDqnModule"
  kwargs:
    # testsumo.net.xml 中非 internal edge 数量 = 1651
    num_road: 1651
    # 状态特征维度：默认 2 -> [distance_to_dest, road_pass_count]
    input_dim: 2
    hidden_dim: 128
    device: "cuda"
    epochs: 10
    batch_size: 32
    lr: 0.001
    min_experiences: 5
    reward_fill: "to"
    epsilon: 0.0

diffusion_model:
  class_path: "src.diffusion.sumo_ryl_diffusion:SumoRylDiffusionModel"
  kwargs:
    # 生成 R 的形状为 [num_car, num_road]
    num_car: 2336
    device: "cuda"
    sampler: "ddim"
    schedule_type: "cosine"
    num_timesteps: 1000
    inference_steps: 50
    ddim_eta: 0.0
    num_epochs: 50
    batch_size: 32
    lr: 0.0001

elite_selector:
  class_path: "src.evolution.temperature_selection:TemperatureEliteSelector"
  kwargs:
    temperature: 1.5
    replacement: false

metric:
  class_path: "src.metrics.sumo_ryl_metric:SumoRylMetric"
  kwargs:
    transform: "inv1p"
    eps: 1.0e-8

parallel_executor:
  class_path: "src.parallel.ray_executor:RayExecutor"
  kwargs:
    ray_init_kwargs:
      num_cpus: 25
      num_gpus: 1
      object_store_memory: 322122547200

    task_options_by_name:
      build_initial_individual:
        num_cpus: 2.5
        num_gpus: 0.1
      mutate_one:
        num_cpus: 2.5
        num_gpus: 0.1

    default_task_options:
      num_cpus: 1

    show_progress: true
    desc: "RayExecutor"
    max_updates: 20

extra:
  note: "sumo_ryl_nov 配置示例（道路累计过车数版本）"
